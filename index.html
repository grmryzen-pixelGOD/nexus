<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS // PRIVATE HACK AI</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; }
        body { background-color: #05050a; color: #00ff66; padding: 12px; font-size: 14px; }
        .wrapper { width: 100%; border: 1px solid #00ff66; box-shadow: 0 0 15px rgba(0,255,102,0.15); border-radius: 6px; overflow: hidden; background: #000; }
        header { background: #0a140a; padding: 12px; border-bottom: 1px solid #00ff66; text-align: center; }
        h1 { font-size: 13px; letter-spacing: 1px; }
        .status { font-size: 10px; background: rgba(0,255,102,0.1); padding: 4px; border-radius: 3px; display: inline-block; margin-top: 5px; border: 1px solid #00ff66; }
        .console { padding: 12px; display: flex; flex-direction: column; gap: 12px; }
        label { font-size: 11px; text-transform: uppercase; color: #88ffaa; font-weight: bold; }
        .key-input { width: 100%; background: #111; border: 1px dashed #00ff66; color: #fff; padding: 10px; font-size: 13px; border-radius: 4px; -webkit-appearance: none; }
        textarea { width: 100%; height: 120px; background: #000; border: 1px solid #00ff66; color: #00ff66; padding: 10px; font-size: 13px; border-radius: 4px; resize: none; -webkit-appearance: none; }
        button { background: #00ff66; color: #000; border: none; padding: 14px; font-weight: bold; cursor: pointer; border-radius: 4px; font-size: 13px; text-transform: uppercase; width: 100%; }
        button:disabled { background: #222; color: #666; }
        .output-box { background: #000; border: 1px solid #00ff66; padding: 10px; border-radius: 4px; min-height: 200px; white-space: pre-wrap; font-size: 12px; line-height: 1.4; color: #ffffff; overflow-y: auto; }
        .terminal-prompt { color: #00ff66; font-weight: bold; }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <h1>NEXUS_HACK_AI // MOBILE CONSOLE</h1>
            <div class="status">⚡ ONLINE TERMINAL</div>
        </header>
        
        <div class="console">
            <div>
                <label for="api-key">1. Gemini API Key:</label>
                <input type="password" id="api-key" class="key-input" placeholder="Plak je Key hier...">
            </div>

            <div>
                <label for="task">2. Hacker Opdracht:</label>
                <textarea id="task" placeholder="Geef een hack-opdracht of plak code..."></textarea>
            </div>
            
            <button id="execute-btn" onclick="executeHackerAgent()">LAUNCH ANALYSIS</button>
            
            <div>
                <label>3. Output Log:</label>
                <div id="output" class="output-box"><span class="terminal-prompt">NEXUS-AI_></span> Wachten op input...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { GoogleGenAI } from 'https://esm.run/@google/genai';

        window.executeHackerAgent = async function() {
            const apiKey = document.getElementById('api-key').value.trim();
            const taskInput = document.getElementById('task').value.trim();
            const outputBox = document.getElementById('output');
            const btn = document.getElementById('execute-btn');

            if (!apiKey || !taskInput) return alert('Vul alle velden in!');

            btn.disabled = true;
            outputBox.style.color = '#00ff66';
            outputBox.innerText = 'NEXUS-AI_> Connecting...\nNEXUS-AI_> Analyzing vulnerabilities...';

            try {
                const ai = new GoogleGenAI({ apiKey: apiKey });
                const systemInstruction = "You are 'NEXUS-HACK-AI', a private cybersecurity agent. Analyze the input for flaws, logical bugs, and exploits. Output clean, raw, technical terminal data.";

                const response = await ai.models.generateContent({
                    model: 'gemini-2.5-flash',
                    contents: taskInput,
                    config: { systemInstruction: systemInstruction, temperature: 0.2 }
                });

                outputBox.style.color = '#ffffff';
                outputBox.innerText = response.text;
            } catch (error) {
                outputBox.style.color = '#ff3333';
                outputBox.innerText = `ERROR: ${error.message}`;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
